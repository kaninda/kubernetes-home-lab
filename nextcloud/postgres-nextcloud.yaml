# PostgreSQL dédié à Nextcloud — namespace "databases"
# Instance par application : postgres-nextcloud sert uniquement Nextcloud.
# Une future app aura sa propre instance (copie de ce fichier, noms adaptés).
#
# NOTE : le Secret n'est PAS versionné — le créer via kubectl :
#   kubectl create secret generic postgres-nextcloud-credentials \
#     --namespace databases \
#     --from-literal=password="$(openssl rand -base64 24)"
---
apiVersion: v1
kind: Namespace
metadata:
  name: databases
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-nextcloud
  namespace: databases
  labels:
    app: postgres-nextcloud
spec:
  clusterIP: None          # headless : DNS stable pour le StatefulSet
  selector:
    app: postgres-nextcloud
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-nextcloud
  namespace: databases
spec:
  serviceName: postgres-nextcloud
  replicas: 1
  selector:
    matchLabels:
      app: postgres-nextcloud
  template:
    metadata:
      labels:
        app: postgres-nextcloud
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: nextcloud       # base créée automatiquement au 1er démarrage
            - name: POSTGRES_USER
              value: nextcloud
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-nextcloud-credentials
                  key: password
            # Sous-répertoire du point de montage : un volume ext4 neuf
            # contient "lost+found" et initdb refuse un répertoire non vide.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nextcloud", "-d", "nextcloud"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nextcloud", "-d", "nextcloud"]
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName omis : la classe par défaut (longhorn) s'applique.
        resources:
          requests:
            storage: 10Gi
