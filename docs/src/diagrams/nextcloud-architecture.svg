<svg width="760" height="600" viewBox="0 0 760 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6472" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="600" fill="#ffffff"/>
  <text x="380" y="32" text-anchor="middle" font-size="19" font-weight="600" fill="#1f2937">Nextcloud — fichiers sur PVC, métadonnées dans PostgreSQL</text>

  <!-- Entrée -->
  <rect x="290" y="52" width="180" height="46" rx="9" fill="#fff7ed" stroke="#fdba74"/>
  <text x="380" y="71" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">nextcloud.kanismile.com</text>
  <text x="380" y="88" text-anchor="middle" font-size="10.5" fill="#9a5b2e">Cloudflare Tunnel → Gateway → HTTPRoute</text>

  <line x1="380" y1="98" x2="380" y2="122" stroke="#5b6472" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Namespace nextcloud -->
  <rect x="40" y="126" width="330" height="220" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="60" y="150" font-size="13" font-weight="600" fill="#334155">namespace nextcloud</text>

  <rect x="70" y="164" width="270" height="56" rx="9" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="205" y="186" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Pod Nextcloud (2/2)</text>
  <text x="205" y="204" text-anchor="middle" font-size="11" fill="#3b5c9a">app + sidecar cron · chart Helm officiel</text>

  <line x1="205" y1="220" x2="205" y2="248" stroke="#5b6472" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="258" y="238" text-anchor="middle" font-size="10.5" fill="#64748b">fichiers bruts</text>

  <rect x="70" y="250" width="270" height="56" rx="9" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="205" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">PVC nextcloud-nextcloud</text>
  <text x="205" y="290" text-anchor="middle" font-size="11" fill="#3b5c9a">50 Gi · /var/www/html/data · extensible</text>

  <!-- Namespace databases -->
  <rect x="390" y="126" width="330" height="220" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="410" y="150" font-size="13" font-weight="600" fill="#334155">namespace databases</text>

  <rect x="420" y="164" width="270" height="56" rx="9" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="555" y="186" text-anchor="middle" font-size="14" font-weight="600" fill="#4c1d95">postgres-nextcloud</text>
  <text x="555" y="204" text-anchor="middle" font-size="11" fill="#6d4aa8">StatefulSet · PostgreSQL 17 · base "nextcloud"</text>

  <line x1="555" y1="220" x2="555" y2="248" stroke="#5b6472" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="420" y="250" width="270" height="56" rx="9" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="555" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#4c1d95">PVC data-postgres-nextcloud-0</text>
  <text x="555" y="290" text-anchor="middle" font-size="11" fill="#6d4aa8">10 Gi · PGDATA en sous-répertoire</text>

  <!-- Flèche métadonnées entre namespaces -->
  <line x1="340" y1="192" x2="418" y2="192" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrBlue)"/>
  <text x="380" y="180" text-anchor="middle" font-size="10.5" fill="#2563eb">métadonnées</text>
  <text x="380" y="212" text-anchor="middle" font-size="9.5" fill="#64748b">externalDatabase</text>
  <text x="380" y="224" text-anchor="middle" font-size="9.5" fill="#64748b">:5432</text>

  <!-- Longhorn -->
  <rect x="40" y="376" width="680" height="150" rx="16" fill="#f0fdf9" stroke="#6ee7b7"/>
  <text x="64" y="402" font-size="14" font-weight="600" fill="#065f46">Longhorn — StorageClass par défaut, réplication ×2</text>

  <path d="M205 306 L205 340 L240 340 L240 414" fill="none" stroke="#5b6472" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M555 306 L555 340 L520 340 L520 414" fill="none" stroke="#5b6472" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="120" y="416" width="240" height="82" rx="10" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="240" y="440" text-anchor="middle" font-size="12.5" font-weight="600" fill="#065f46">Volume fichiers (50 Gi)</text>
  <text x="240" y="460" text-anchor="middle" font-size="11" fill="#0a7a5c">réplica worker-1 + réplica worker-2</text>
  <text x="240" y="478" text-anchor="middle" font-size="10" fill="#4b8a72">thin-provisioned · snapshot/restore indépendant</text>

  <rect x="400" y="416" width="240" height="82" rx="10" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="520" y="440" text-anchor="middle" font-size="12.5" font-weight="600" fill="#065f46">Volume base (10 Gi)</text>
  <text x="520" y="460" text-anchor="middle" font-size="11" fill="#0a7a5c">réplica worker-1 + réplica worker-2</text>
  <text x="520" y="478" text-anchor="middle" font-size="10" fill="#4b8a72">thin-provisioned · snapshot/restore indépendant</text>

  <text x="380" y="560" text-anchor="middle" font-size="11.5" fill="#64748b">Un upload se scinde en deux : le fichier brut sur le PVC fichiers, la métadonnée (chemin, taille, partages) en base.</text>
  <text x="380" y="580" text-anchor="middle" font-size="11.5" fill="#64748b">Deux volumes séparés = dimensionnement, snapshots et restores indépendants (fichiers ≠ base).</text>
</svg>
